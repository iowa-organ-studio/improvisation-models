<html lang="en">

    <link rel="stylesheet" href="./style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">

<body class="landing-page">

    <div class="page-title">

        <h1>
            Models for Improvisation
        </h1>

    </div>


    <div class="models-container">


        <a class="model-card" href="trainer.html?model=Scheidemann-Prelude">

            <div class="model-left">



                <h2>
                    Scheidemann Free Praeludia
                </h2>

                <p>
                    Learn to embellish simple harmony with strong, dramatic gestures.
                </p>

                <div class="launch-button">
                    Start Training →
                </div>

            </div>


            <div class="model-right">

                <img class="music-image" src="img/music/Praeludium.jpg">

                <img class="composer-image" src="img/composers/Heinrich_Scheidemann.jpg">

            </div>

        </a>



        <a class="model-card" href="trainer.html?model=Buxtehude-Chorale-Prelude">

            <div class="model-left">



                <h2>
                    Buxtehude Chorale Preludes
                </h2>

                <p>
                    Turn a hymn tune into a lyrical solo soprano, with contrapuntal accompanimental voices.
                </p>

                <div class="launch-button">
                    Start Training →
                </div>

            </div>


            <div class="model-right">

                <img class="music-image" src="img/music/Buxtehude-Chorale-Prelude.jpg">

                <img class="composer-image" src="img/composers/Dieterich_Buxtehude.png">

            </div>

        </a>


    </div>
